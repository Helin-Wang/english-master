<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Master</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Toggle button ── */
    .toggle-btn {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 300;
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 10px;
      background: #4f6ef7;
      color: #fff;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(79,110,247,0.3);
    }

    /* ── Overlay (mobile) ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
    }
    .overlay.show { display: block; }

    /* ── Sidebar ── */
    .sidebar {
      width: 200px;
      background: #fff;
      border-right: 1px solid #e8e8e8;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 18px 16px 12px;
      font-size: 15px;
      font-weight: 700;
      color: #1a1a1a;
      border-bottom: 1px solid #f0f0f0;
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      body { overflow-x: hidden; }

      .toggle-btn { display: flex; }

      .sidebar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        z-index: 200;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
        box-shadow: 4px 0 20px rgba(0,0,0,0.15);
      }
      .sidebar.open { transform: translateX(0); }

      .main { padding: 66px 16px 20px; }

      .scene {
        width: calc(100vw - 32px);
        max-width: none;
        height: 300px;
      }
      .face { padding: 24px 20px; }
      .face-front .zh { font-size: 26px; }
      .face-back .en  { font-size: 18px; }
      .face-back .ex  { font-size: 13px; }

      .flip-hint { margin-top: 8px; }
      .controls { margin-top: 16px; gap: 12px; }
      .btn-nav { padding: 10px 16px; font-size: 13px; }
      .kbd-hint { display: none; }
    }
    .sidebar-actions {
      display: flex;
      gap: 6px;
      padding: 10px 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    .btn-sm {
      flex: 1;
      padding: 5px 0;
      font-size: 12px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      background: #fff;
      color: #555;
      cursor: pointer;
    }
    .btn-sm:hover { background: #f5f5f5; }
    .date-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }
    .date-item {
      display: flex;
      align-items: center;
      padding: 8px 14px;
      font-size: 13px;
      color: #555;
      cursor: pointer;
      user-select: none;
    }
    .date-item:hover { background: #f7f7f7; }
    .date-item input { margin-right: 8px; accent-color: #4f6ef7; }
    .date-item.active { color: #4f6ef7; font-weight: 600; }
    .count-badge {
      margin-left: auto;
      font-size: 11px;
      color: #bbb;
    }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .empty-state {
      color: #bbb;
      font-size: 16px;
      text-align: center;
      line-height: 2;
    }

    /* ── Flip Card ── */
    .scene {
      perspective: 1200px;
      width: 520px;
      max-width: 100%;
      height: 300px;
      cursor: pointer;
    }
    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(.4,0,.2,1);
    }
    .card.flipped { transform: rotateY(180deg); }
    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.10);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 36px 40px;
    }
    .face-front { background: #fff; }
    .face-back  { background: #fff; transform: rotateY(180deg); align-items: flex-start; }

    .face-front .tag {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #ccc;
      margin-bottom: 20px;
    }
    .face-front .zh {
      font-size: 36px;
      font-weight: 700;
      color: #1a1a1a;
      text-align: center;
    }
    .face-back .en {
      font-size: 26px;
      font-weight: 700;
      color: #4f6ef7;
      margin-bottom: 16px;
      line-height: 1.3;
    }
    .face-back .ex {
      font-size: 14px;
      color: #888;
      line-height: 1.7;
      font-style: italic;
    }
    .flip-hint {
      font-size: 12px;
      color: #d0d0d0;
      margin-top: 6px;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 28px;
    }
    .btn-nav {
      padding: 10px 28px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 10px;
      background: #4f6ef7;
      color: #fff;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .btn-nav:hover  { background: #3b58e0; }
    .btn-nav:active { transform: scale(.97); }
    .btn-nav:disabled { background: #e0e0e0; color: #bbb; cursor: default; transform: none; }
    .progress { font-size: 14px; color: #aaa; min-width: 70px; text-align: center; }

    .kbd-hint {
      font-size: 12px;
      color: #ccc;
      margin-top: 14px;
    }
    .kbd-hint kbd {
      background: #f0f0f0;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 11px;
      color: #888;
    }
  </style>
</head>
<body>

<button class="toggle-btn" onclick="toggleSidebar()">☰</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">English Master</div>
  <div class="sidebar-actions">
    <button class="btn-sm" onclick="selectAll()">全选</button>
    <button class="btn-sm" onclick="clearAll()">清空</button>
  </div>
  <div class="date-list" id="dateList"></div>
</div>

<div class="main" id="main">
  <div class="empty-state">← 选择左侧日期<br>开始复习</div>
</div>

<script>
let allData = {};
let cards = [];
let idx = 0;
let flipped = false;

fetch('data.json')
  .then(r => r.json())
  .then(data => { allData = data; renderSidebar(); });

function renderSidebar() {
  const dates = Object.keys(allData).sort().reverse();
  document.getElementById('dateList').innerHTML = dates.map(d => `
    <label class="date-item">
      <input type="checkbox" value="${d}" onchange="rebuild()">
      ${d}
      <span class="count-badge">${allData[d].length}</span>
    </label>
  `).join('');
}

function selectAll() {
  document.querySelectorAll('#dateList input').forEach(cb => cb.checked = true);
  rebuild();
}
function clearAll() {
  document.querySelectorAll('#dateList input').forEach(cb => cb.checked = false);
  rebuild();
}

function rebuild() {
  const selected = [...document.querySelectorAll('#dateList input:checked')].map(cb => cb.value);
  document.querySelectorAll('.date-item').forEach(el => {
    el.classList.toggle('active', el.querySelector('input').checked);
  });
  cards = selected.flatMap(d => allData[d] || []);
  shuffle(cards);
  idx = 0;
  closeSidebar();
  renderMain();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function renderMain() {
  const main = document.getElementById('main');
  if (!cards.length) {
    main.innerHTML = '<div class="empty-state">← 选择左侧日期<br>开始复习</div>';
    return;
  }
  main.innerHTML = `
    <div class="scene" onclick="flip()">
      <div class="card" id="card">
        <div class="face face-front">
          <div class="tag">中文 → 英文</div>
          <div class="zh" id="zh"></div>
        </div>
        <div class="face face-back">
          <div class="en" id="en"></div>
          <div class="ex" id="ex"></div>
        </div>
      </div>
    </div>
    <div class="flip-hint">点击卡片翻转</div>
    <div class="controls">
      <button class="btn-nav" id="bPrev" onclick="event.stopPropagation();go(-1)">← 上一张</button>
      <div class="progress" id="prog"></div>
      <button class="btn-nav" id="bNext" onclick="event.stopPropagation();go(1)">下一张 →</button>
    </div>
    <div class="kbd-hint"><kbd>空格</kbd> 翻转　<kbd>←</kbd><kbd>→</kbd> 切换</div>
  `;
  showCard();
}

function showCard() {
  const c = cards[idx];
  document.getElementById('zh').textContent = c.chinese;
  document.getElementById('en').textContent = c.english;
  document.getElementById('ex').textContent = c.example ? `"${c.example}"` : '';
  document.getElementById('prog').textContent = `${idx + 1} / ${cards.length}`;
  document.getElementById('bPrev').disabled = idx === 0;
  document.getElementById('bNext').disabled = idx === cards.length - 1;
  flipped = false;
  document.getElementById('card')?.classList.remove('flipped');
}

function flip() {
  flipped = !flipped;
  document.getElementById('card')?.classList.toggle('flipped', flipped);
}

function go(dir) {
  const n = idx + dir;
  if (n >= 0 && n < cards.length) { idx = n; showCard(); }
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space')      { e.preventDefault(); flip(); }
  if (e.code === 'ArrowLeft')  go(-1);
  if (e.code === 'ArrowRight') go(1);
});
</script>
</body>
</html>
